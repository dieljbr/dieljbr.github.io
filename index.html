<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIEL</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.card{
background:#1f1f1f;
padding:30px;
border-radius:15px;
text-align:center;
width:340px;
box-shadow:0 0 20px #000;
}
a{
display:block;
margin:12px 0;
padding:12px;
background:#5865F2;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;
}
h2{
margin-top:20px;
color:#00ff99;
}
</style>

</head>

<body>

<div class="card">

<h1>DIEL</h1>

<p>Bem-vindo ao meu site!</p>

<a href="https://discord.gg/B2HMpM8mX" target="_blank">💬 Discord</a>

<h2>Cornos que visitaram meu site</h2>

<h1 id="contador">0</h1>

</div>

<script>
let visitas = localStorage.getItem("visitas");

if(!visitas){
visitas = 1;
}else{
visitas = parseInt(visitas) + 1;
}

localStorage.setItem("visitas", visitas);

document.getElementById("contador").innerText = visitas;
</script>

</body>
</html>
