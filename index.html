<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIEL</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
overflow-x:hidden;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:#fff;
}

canvas.bg-matrix{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
pointer-events:none;
}

.main-container {
display: flex;
gap: 15px;
align-items: center;
z-index: 10;
position: relative;
padding: 20px;
}

.card{
background:rgba(0,20,0,.85);
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 0 35px rgba(0, 255, 65, 0.4);
backdrop-filter:blur(10px);
width:260px;
border: 1px solid rgba(0, 255, 65, 0.3);
display: flex;
flex-direction: column;
align-items: center;
}

h1{
font-size:35px;
color:#ff0000;
text-shadow:0 0 25px rgba(255, 0, 0, 0.9);
margin-bottom:3px;
letter-spacing: 2px;
}

.subtitle {
font-size: 12px;
color: #bbb;
margin-bottom: 12px;
}

a{
display:flex;
align-items:center;
justify-content:center;
gap: 8px;
margin:6px 0;
padding:10px;
background:linear-gradient(135deg, #008000, #003300);
color:#fff;
text-decoration:none;
border-radius:10px;
transition:.3s;
font-weight:bold;
width: 100%;
box-shadow: 0 4px 15px rgba(0, 255, 65, 0.3);
font-size: 12px;
}

a:hover{
transform:translateY(-3px);
box-shadow:0 0 25px rgba(0, 255, 65, 0.7);
}

.music-btn {
display:flex;
align-items:center;
justify-content:center;
gap: 8px;
margin-top: 8px;
padding: 10px;
background: rgba(0, 40, 0, 0.8);
color: #00ff41;
border: 1px solid rgba(0, 255, 65, 0.4);
border-radius: 10px;
cursor: pointer;
font-weight: bold;
width: 100%;
transition: .3s;
font-size: 12px;
}

.music-btn:hover {
background: rgba(0, 255, 65, 0.2);
box-shadow: 0 0 15px rgba(0, 255, 65, 0.4);
color: #fff;
}

/* Painel da IA */
.ai-card {
background:rgba(0,20,0,.85);
padding:15px;
border-radius:20px;
box-shadow:0 0 35px rgba(0, 255, 65, 0.4);
backdrop-filter:blur(10px);
width:260px;
height:390px;
border: 1px solid rgba(0, 255, 65, 0.3);
display: flex;
flex-direction: column;
justify-content: space-between;
}

.ai-header {
font-size: 14px;
color: #00ff41;
font-weight: bold;
text-align: center;
margin-bottom: 6px;
text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
}

.ai-messages {
flex: 1;
background: rgba(0, 0, 0, 0.6);
border-radius: 8px;
padding: 6px;
overflow-y: auto;
display: flex;
flex-direction: column;
gap: 6px;
border: 1px solid rgba(0, 255, 65, 0.2);
}

.msg {
padding: 6px 8px;
border-radius: 6px;
font-size: 11px;
max-width: 85%;
line-height: 1.3;
word-break: break-word;
}

.msg.ai {
background: rgba(0, 50, 0, 0.8);
color: #00ff41;
align-self: flex-start;
border: 1px solid rgba(0, 255, 65, 0.3);
}

.msg.user {
background: rgba(80, 0, 0, 0.8);
color: #ff4444;
align-self: flex-end;
border: 1px solid rgba(255, 0, 0, 0.3);
}

.ai-input-box {
display: flex;
gap: 5px;
margin-top: 8px;
}

.ai-input-box input {
flex: 1;
padding: 8px;
border-radius: 6px;
border: 1px solid rgba(0, 255, 65, 0.4);
background: rgba(0, 0, 0, 0.8);
color: #fff;
outline: none;
font-size: 11px;
}

.ai-input-box input:focus {
border-color: #00ff41;
box-shadow: 0 0 10px rgba(0, 255, 65, 0.4);
}

.ai-input-box button {
padding: 8px 10px;
border-radius: 6px;
border: none;
background: #00ff41;
color: #000;
font-weight: bold;
cursor: pointer;
transition: .3s;
font-size: 11px;
}

.ai-input-box button:hover {
background: #00cc33;
box-shadow: 0 0 10px rgba(0, 255, 65, 0.6);
}

/* Jogo da Velha */
.game-card {
background:rgba(0,20,0,.85);
padding:15px;
border-radius:20px;
box-shadow:0 0 35px rgba(0, 255, 65, 0.4);
backdrop-filter:blur(10px);
width:260px;
border: 1px solid rgba(0, 255, 65, 0.3);
display: flex;
flex-direction: column;
align-items: center;
}

.game-header {
font-size: 14px;
color: #00ff41;
font-weight: bold;
margin-bottom: 6px;
text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
text-align: center;
}

.board {
display: grid;
grid-template-columns: repeat(3, 55px);
grid-template-rows: repeat(3, 55px);
gap: 5px;
margin-bottom: 8px;
}

.cell {
background: rgba(0, 0, 0, 0.8);
border: 1px solid rgba(0, 255, 65, 0.4);
border-radius: 6px;
font-size: 26px;
font-weight: bold;
color: #00ff41;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
user-select: none;
}

.cell.x {
color: #ff4444;
}

.game-status {
font-size: 11px;
color: #fff;
margin-bottom: 6px;
height: 16px;
text-align: center;
}

.reset-btn {
padding: 7px 12px;
border-radius: 6px;
border: none;
background: #00ff41;
color: #000;
font-weight: bold;
cursor: pointer;
font-size: 11px;
transition: .3s;
}

.reset-btn:hover {
background: #00cc33;
box-shadow: 0 0 10px rgba(0, 255, 65, 0.6);
}

/* Jogo Estilo Mario */
#marioCanvas {
background: #111;
border: 1px solid rgba(0, 255, 65, 0.4);
border-radius: 6px;
margin-bottom: 6px;
}

.mario-controls {
display: flex;
gap: 5px;
width: 100%;
justify-content: center;
margin-top: 4px;
}

.mario-ctrl-btn {
flex: 1;
padding: 6px;
background: rgba(0, 50, 0, 0.8);
border: 1px solid rgba(0, 255, 65, 0.4);
color: #00ff41;
border-radius: 5px;
font-weight: bold;
cursor: pointer;
font-size: 11px;
}

.mario-ctrl-btn:active {
background: #00ff41;
color: #000;
}

@media (max-width: 1100px) {
.main-container {
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
    height: auto;
}
body {
    overflow-y: auto;
    height: auto;
    padding: 20px 0;
}
}
</style>
</head>

<body>

<canvas class="bg-matrix" id="bg"></canvas>

<div id="youtube-player" style="display:none;"></div>

<div class="main-container">
    <!-- Perfil e Música -->
    <div class="card">
        <h1>DIEL</h1>
        <p class="subtitle">Bem-vindo ao meu site</p>

        <a href="https://discord.gg/B2HMpM8mX" target="_blank">
        💬 Discord
        </a>

        <a href="https://www.instagram.com/_eitaakaah?igsh=MWtneXJlbzgzbmJk" target="_blank">
        📷 Instagram
        </a>

        <button class="music-btn" id="music-toggle" type="button">
        🎵 Tocar Música (Zeca Pagodinho)
        </button>
    </div>

    <!-- Assistente IA -->
    <div class="ai-card">
        <div class="ai-header">🤖 Assistente do Diel</div>
        <div class="ai-messages" id="chat-messages">
            <div class="msg ai">E aí, Diel! Manda a braba, o que quer trocar ideia hoje?</div>
        </div>
        <div class="ai-input-box">
            <input type="text" id="user-input" placeholder="Digite sua mensagem...">
            <button id="send-btn" type="button">Enviar</button>
        </div>
    </div>

    <!-- Jogo da Velha (Diel vs Você) -->
    <div class="game-card">
        <div class="game-header">🎮 Diel vs Você</div>
        <div class="game-status" id="game-status">Sua vez (X)</div>
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        <button class="reset-btn" id="reset-board" type="button">Reiniciar Jogo</button>
    </div>

    <!-- Jogo Estilo Mario -->
    <div class="game-card">
        <div class="game-header">🍄 Super Diel World</div>
        <canvas id="marioCanvas" width="230" height="90"></canvas>
        <div class="game-status" id="mario-status">Colete moedas e desvie dos bichos!</div>
        <div class="mario-controls">
            <button class="mario-ctrl-btn" id="btn-left" type="button">◀ ESQ</button>
            <button class="mario-ctrl-btn" id="btn-jump" type="button">▲ PULAR</button>
            <button class="mario-ctrl-btn" id="btn-right" type="button">DIR ▶</button>
        </div>
    </div>
</div>

<script>
// 1. Efeito Matrix Fluido e Seguro
const canvasBg = document.getElementById("bg");
const ctxBg = canvasBg.getContext("2d");

function resizeCanvas() {
    canvasBg.width = window.innerWidth;
    canvasBg.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン';
const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
const alphabet = katakana + latin;

const fontSize = 16;
let columns = canvasBg.width / fontSize;
const rainDrops = [];
for (let x = 0; x < columns; x++) { rainDrops[x] = 1; }

function drawMatrix() {
    ctxBg.fillStyle = 'rgba(0, 0, 0, 0.08)';
    ctxBg.fillRect(0, 0, canvasBg.width, canvasBg.height);
    ctxBg.fillStyle = '#00FF41';
    ctxBg.font = fontSize + 'px monospace';

    for (let i = 0; i < rainDrops.length; i++) {
        const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
        ctxBg.fillText(text, i * fontSize, rainDrops[i] * fontSize);

        if (rainDrops[i] * fontSize > canvasBg.height && Math.random() > 0.975) {
            rainDrops[i] = 0;
        }
        rainDrops[i]++;
    }
}
setInterval(drawMatrix, 35);

// 2. API do YouTube Segura
let player;
let apiLoaded = false;

function onYouTubeIframeAPIReady() {
    player = new YT.Player('youtube-player', {
        height: '0',
        width: '0',
        videoId: 'eFQCPE9uDy0',
        playerVars: { 
            'autoplay': 0,
            'controls': 0,
            'loop': 1,
            'playlist': 'eFQCPE9uDy0'
        },
        events: {
            'onReady': () => { apiLoaded = true; }
        }
    });
}

let tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
let firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

document.getElementById("music-toggle").addEventListener("click", function() {
    const btn = this;
    if (!apiLoaded || !player || typeof player.getPlayerState !== 'function') {
        alert("O player ainda está carregando, tente em 2 segundos!");
        return;
    }
    try {
        let estado = player.getPlayerState();
        if (estado === YT.PlayerState.PLAYING) {
            player.pauseVideo();
            btn.innerHTML = "🎵 Tocar Música (Zeca Pagodinho)";
        } else {
            player.playVideo();
            btn.innerHTML = "🔇 Pausar Música";
        }
    } catch (e) {
        player.playVideo();
        btn.innerHTML = "🔇 Pausar Música";
    }
});

// 3. Jogo da Velha Robusto
let tabuleiro = ['', '', '', '', '', '', '', '', ''];
let jogoAtivo = true;

const cells = document.querySelectorAll('.cell');
cells.forEach(cell => {
    cell.addEventListener('click', function() {
        let index = parseInt(this.getAttribute('data-index'));
        fazerJogada(index);
    });
});

document.getElementById('reset-board').addEventListener('click', reiniciarJogo);

function fazerJogada(index) {
    if (tabuleiro[index] === '' && jogoAtivo) {
        tabuleiro[index] = 'X';
        atualizarTabuleiro();
        
        if (verificarFimDeJogo('X')) return;
        
        document.getElementById('game-status').innerText = "Diel pensando...";
        jogoAtivo = false;
        
        setTimeout(() => {
            let jogadaIA = escolherJogadaIA();
            if (jogadaIA !== -1) {
                tabuleiro[jogadaIA] = 'O';
            }
            atualizarTabuleiro();
            if (!verificarFimDeJogo('O')) {
                document.getElementById('game-status').innerText = "Sua vez (X)";
                jogoAtivo = true;
            }
        }, 400);
    }
}

function atualizarTabuleiro() {
    cells.forEach((cell, i) => {
        cell.innerText = tabuleiro[i];
        if (tabuleiro[i] === 'X') {
            cell.classList.add('x');
        } else {
            cell.classList.remove('x');
        }
    });
}

function escolherJogadaIA() {
    for (let i = 0; i < 9; i++) {
        if (tabuleiro[i] === '') {
            tabuleiro[i] = 'O';
            if (checarVitoria('O')) { tabuleiro[i] = ''; return i; }
            tabuleiro[i] = '';
        }
    }
    for (let i = 0; i < 9; i++) {
        if (tabuleiro[i] === '') {
            tabuleiro[i] = 'X';
            if (checarVitoria('X')) { tabuleiro[i] = ''; return i; }
            tabuleiro[i] = '';
        }
    }
    if (tabuleiro[4] === '') return 4;
    let vazias = [];
    for (let i = 0; i < 9; i++) {
        if (tabuleiro[i] === '') vazias.push(i);
    }
    if (vazias.length > 0) {
        return vazias[Math.floor(Math.random() * vazias.length)];
    }
    return -1;
}

function checarVitoria(jogador) {
    const combinacoes = [
        [0,1,2], [3,4,5], [6,7,8],
        [0,3,6], [1,4,7], [2,5,8],
        [0,4,8], [2,4,6]
    ];
    return combinacoes.some(comb => 
        tabuleiro[comb[0]] === jogador && 
        tabuleiro[comb[1]] === jogador && 
        tabuleiro[comb[2]] === jogador
    );
}

function verificarFimDeJogo(jogador) {
    if (checarVitoria(jogador)) {
        document.getElementById('game-status').innerText = jogador === 'X' ? "Você venceu o Diel! 🎉" : "O Diel venceu! 😎";
        jogoAtivo = false;
        return true;
    }
    if (!tabuleiro.includes('')) {
        document.getElementById('game-status').innerText = "Empate! 🤝";
        jogoAtivo = false;
        return true;
    }
    return false;
}

function reiniciarJogo() {
    tabuleiro = ['', '', '', '', '', '', '', '', ''];
    jogoAtivo = true;
    document.getElementById('game-status').innerText = "Sua vez (X)";
    atualizarTabuleiro();
}

// 4. Jogo Estilo Mario (Super Diel World) Otimizado
const mCanvas = document.getElementById("marioCanvas");
const mCtx = mCanvas.getContext("2d");

let mario = {
    x: 20,
    y: 50,
    width: 14,
    height: 18,
    vx: 0,
    vy: 0,
    speed: 2.5,
    jump: -7,
    gravity: 0.45,
    isJumping: false
};

let moedas = [
    { x: 90, y: 55, coletada: false },
    { x: 150, y: 40, coletada: false },
    { x: 200, y: 55, coletada: false }
];

let bicho = {
    x: 130,
    y: 57,
    width: 12,
    height: 12,
    speed: 1.2,
    dir: 1
};

let scoreMario = 0;
let vidas = 3;
let gameOverMario = false;

let teclas = { esquerda: false, direita: false };

window.addEventListener('keydown', (e) => {
    if (document.activeElement.id === 'user-input') return;
    if (e.key === 'ArrowLeft' || e.key === 'a') teclas.esquerda = true;
    if (e.key === 'ArrowRight' || e.key === 'd') teclas.direita = true;
    if ((e.key === 'ArrowUp' || e.key === ' ' || e.key === 'w') && !mario.isJumping) {
        mario.vy = mario.jump;
        mario.isJumping = true;
    }
});

window.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'a') teclas.esquerda = false;
    if (e.key === 'ArrowRight' || e.key === 'd') teclas.direita = false;
});

document.getElementById('btn-left').addEventListener('mousedown', () => teclas.esquerda = true);
document.getElementById('btn-left').addEventListener('mouseup', () => teclas.esquerda = false);
document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); teclas.esquerda = true; });
document.getElementById('btn-left').addEventListener('touchend', (e) => { e.preventDefault(); teclas.esquerda = false; });

document.getElementById('btn-right').addEventListener('mousedown', () => teclas.direita = true);
document.getElementById('btn-right').addEventListener('mouseup', () => teclas.direita = false);
document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); teclas.direita = true; });
document.getElementById('btn-right').addEventListener('touchend', (e) => { e.preventDefault(); teclas.direita = false; });

document.getElementById('btn-jump').addEventListener('click', () => {
    if (!mario.isJumping) {
        mario.vy = mario.jump;
        mario.isJumping = true;
    }
});
document.getElementById('btn-jump').addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (!mario.isJumping) {
        mario.vy = mario.jump;
        mario.isJumping = true;
    }
});

function atualizarMario() {
    if (gameOverMario) return;

    mario.vx = 0;
    if (teclas.esquerda) mario.vx = -mario.speed;
    if (teclas.direita) mario.vx = mario.speed;
    mario.x += mario.vx;

    if (mario.x < 0) mario.x = 0;
    if (mario.x > mCanvas.width - mario.width) mario.x = mCanvas.width - mario.width;

    mario.vy += mario.gravity;
    mario.y += mario.vy;

    if (mario.y > 57) {
        mario.y = 57;
        mario.vy = 0;
        mario.isJumping = false;
    }

    bicho.x += bicho.speed * bicho.dir;
    if (bicho.x < 70 || bicho.x > 210) {
        bicho.dir *= -1;
    }

    moedas.forEach(m => {
        if (!m.coletada &&
            mario.x < m.x + 10 && mario.x + mario.width > m.x &&
            mario.y < m.y + 10 && mario.y + mario.height > m.y) {
            m.coletada = true;
            scoreMario += 100;
            document.getElementById("mario-status").innerText = "💰 Moeda coletada! +100 pts";
        }
    });

    if (moedas.every(m => m.coletada)) {
        moedas.forEach(m => {
            m.x = 60 + Math.random() * 140;
            m.coletada = false;
        });
    }

    if (
        mario.x < bicho.x + bicho.width &&
        mario.x + mario.width > bicho.x &&
        mario.y < bicho.y + bicho.height &&
        mario.y + mario.height > bicho.y
    ) {
        if (mario.vy > 0 && mario.y + mario.height - mario.vy <= bicho.y + 6) {
            scoreMario += 200;
            bicho.x = 100 + Math.random() * 80;
            mario.vy = -5;
            document.getElementById("mario-status").innerText = "💥 Inimigo derrotado! +200 pts";
        } else {
            vidas--;
            document.getElementById("mario-status").innerText = `⚠️ Perdeu vida! Restam: ${vidas}`;
            mario.x = 20;
            mario.y = 57;
            if (vidas <= 0) {
                gameOverMario = true;
                document.getElementById("mario-status").innerText = "❌ Game Over! Clique para Reiniciar";
            }
        }
    }
}

function desenharMario() {
    mCtx.clearRect(0, 0, mCanvas.width, mCanvas.height);

    mCtx.fillStyle = "#008800";
    mCtx.fillRect(0, 75, mCanvas.width, 15);
    mCtx.strokeStyle = "#00FF41";
    mCtx.lineWidth = 2;
    mCtx.beginPath();
    mCtx.moveTo(0, 75);
    mCtx.lineTo(mCanvas.width, 75);
    mCtx.stroke();

    moedas.forEach(m => {
        if (!m.coletada) {
            mCtx.fillStyle = "#FFD700";
            mCtx.beginPath();
            mCtx.arc(m.x + 4, m.y + 4, 5, 0, Math.PI * 2);
            mCtx.fill();
            mCtx.strokeStyle = "#FFA500";
            mCtx.stroke();
        }
    });

    mCtx.fillStyle = "#FF4444";
    mCtx.fillRect(bicho.x, bicho.y, bicho.width, bicho.height);
    mCtx.fillStyle = "#FFF";
    mCtx.fillRect(bicho.x + 2, bicho.y + 3, 2, 3);
    mCtx.fillRect(bicho.x + 7, bicho.y + 3, 2, 3);

    mCtx.fillStyle = "#FF0000";
    mCtx.fillRect(mario.x, mario.y, mario.width, mario.height);
    mCtx.fillStyle = "#00FF41";
    mCtx.font = "bold 12px monospace";
    mCtx.fillText("D", mario.x + 3, mario.y + 14);

    mCtx.fillStyle = "#FFFFFF";
    mCtx.font = "9px monospace";
    mCtx.fillText(`PTS: ${scoreMario}  ❤️ x${vidas}`, 10, 15);

    if (gameOverMario) {
        mCtx.fillStyle = "rgba(0, 0, 0, 0.8)";
        mCtx.fillRect(0, 0, mCanvas.width, mCanvas.height);
        mCtx.fillStyle = "#FF4444";
        mCtx.font = "bold 12px monospace";
        mCtx.textAlign = "center";
        mCtx.fillText("GAME OVER", mCanvas.width / 2, 40);
