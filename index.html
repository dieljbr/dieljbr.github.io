<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIEL</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.card{
background:rgba(0,20,0,.85);
padding:35px;
border-radius:20px;
text-align:center;
box-shadow:0 0 35px rgba(0, 255, 65, 0.4);
backdrop-filter:blur(10px);
width:360px;
border: 1px solid rgba(0, 255, 65, 0.3);
display: flex;
flex-direction: column;
align-items: center;
}

/* Nome DIEL com chamas de fogo animadas */
.fire-text {
    font-size: 70px;
    font-weight: bold;
    font-family: 'Impact', sans-serif;
    color: #ffcc00;
    position: relative;
    margin-bottom: 10px;
    text-transform: uppercase;
    text-shadow: 0 0 10px #ff3300, 0 0 20px #ff6600, 0 0 30px #ff9900;
    animation: flameMove 0.8s infinite alternate ease-in-out;
}

@keyframes flameMove {
    0% {
        transform: scale(1) skewX(0deg);
        text-shadow: 0 0 10px #ff3300, 0 0 20px #ff6600, 0 0 30px #ff9900;
    }
    50% {
        transform: scale(1.03) skewX(-2deg);
        text-shadow: 2px -4px 12px #ff0000, -2px -8px 24px #ff5500, 0 -12px 35px #ffff00;
    }
    100% {
        transform: scale(0.98) skewX(2deg);
        text-shadow: -2px -3px 15px #ff2200, 2px -6px 20px #ff8800, 0 -10px 30px #ffdd00;
    }
}

.fire-text::before {
    content: "DIEL";
    position: absolute;
    top: -12px;
    left: 0;
    width: 100%;
    height: 100%;
    color: #ff3300;
    filter: blur(6px) opacity(0.85);
    z-index: -1;
    animation: fireGlow 0.4s infinite alternate;
}

@keyframes fireGlow {
    0% { transform: scale(1.02); filter: blur(5px) opacity(0.8); }
    100% { transform: scale(1.06); filter: blur(8px) opacity(1); }
}

.subtitle {
font-size: 15px;
color: #bbb;
margin-bottom: 25px;
margin-top: 10px;
}

a{
display:flex;
align-items:center;
justify-content:center;
gap: 10px;
margin:12px 0;
padding:14px;
background:linear-gradient(135deg, #008000, #003300);
color:#fff;
text-decoration:none;
border-radius:12px;
transition:.3s;
font-weight:bold;
width: 100%;
box-shadow: 0 4px 15px rgba(0, 255, 65, 0.3);
}

a:hover{
transform:translateY(-3px);
box-shadow:0 0 25px rgba(0, 255, 65, 0.7);
}

.music-btn {
display:flex;
align-items:center;
justify-content:center;
gap: 10px;
margin-top: 20px;
padding: 12px;
background: rgba(0, 40, 0, 0.8);
color: #00ff41;
border: 1px solid rgba(0, 255, 65, 0.4);
border-radius: 12px;
cursor: pointer;
font-weight: bold;
width: 100%;
transition: .3s;
}

.music-btn:hover {
background: rgba(0, 255, 65, 0.2);
box-shadow: 0 0 15px rgba(0, 255, 65, 0.4);
color: #fff;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- Elemento de áudio configurado -->
<audio id="bg-music" preload="auto" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf756.mp3?filename=cyberpunk-2099-10701.mp3" type="audio/mpeg">
  Seu navegador não suporta áudio.
</audio>

<div class="card">

    <div class="fire-text">DIEL</div>

<p class="subtitle">Bem-vindo ao meu site</p>

<a href="https://discord.gg/B2HMpM8mX" target="_blank">
💬 Discord
</a>

<a href="https://www.instagram.com/_eitaakaah?igsh=MWtneXJlbzgzbmJk" target="_blank">
📷 Instagram
</a>

<button class="music-btn" id="music-toggle" onclick="toggleMusic()">
🔊 Tocar Música Eletrônica
</button>

</div>

<script>
// Efeito de Chuva Matrix Verde Clássica
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.onresize = resizeCanvas;

const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン';
const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
const alphabet = katakana + latin;

const fontSize = 16;
let columns = canvas.width / fontSize;

const rainDrops = [];
for (let x = 0; x < columns; x++) {
    rainDrops[x] = 1;
}

function drawMatrix() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#00FF41'; // Verde Matrix clássico
    ctx.font = fontSize + 'px monospace';

    for (let i = 0; i < rainDrops.length; i++) {
        const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
        ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

        if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            rainDrops[i] = 0;
        }
        rainDrops[i]++;
    }
}

setInterval(drawMatrix, 30);

// Controle de Música
const music = document.getElementById("bg-music");
const musicBtn = document.getElementById("music-toggle");
let isPlaying = false;

function toggleMusic() {
    if (isPlaying) {
        music.pause();
        musicBtn.innerHTML = "🔊 Tocar Música Eletrônica";
        isPlaying = false;
    } else {
        music.play().then(() => {
            musicBtn.innerHTML = "🔇 Pausar Música";
            isPlaying = true;
        }).catch(error => {
            console.log("Erro de reprodução:", error);
        });
    }
}
</script>

</body>
</html>
