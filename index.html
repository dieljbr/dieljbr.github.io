<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIEL</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
}

canvas.bg-matrix{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
pointer-events:none;
}

.main-container {
display: flex;
gap: 20px;
align-items: center;
z-index: 10;
position: relative;
}

.card{
background:rgba(0,20,0,.85);
padding:25px;
border-radius:20px;
text-align:center;
box-shadow:0 0 35px rgba(0, 255, 65, 0.4);
backdrop-filter:blur(10px);
width:280px;
border: 1px solid rgba(0, 255, 65, 0.3);
display: flex;
flex-direction: column;
align-items: center;
}

h1{
font-size:40px;
color:#ff0000;
text-shadow:0 0 25px rgba(255, 0, 0, 0.9);
margin-bottom:5px;
letter-spacing: 2px;
}

.subtitle {
font-size: 13px;
color: #bbb;
margin-bottom: 15px;
}

a{
display:flex;
align-items:center;
justify-content:center;
gap: 10px;
margin:8px 0;
padding:10px;
background:linear-gradient(135deg, #008000, #003300);
color:#fff;
text-decoration:none;
border-radius:12px;
transition:.3s;
font-weight:bold;
width: 100%;
box-shadow: 0 4px 15px rgba(0, 255, 65, 0.3);
font-size: 12px;
}

a:hover{
transform:translateY(-3px);
box-shadow:0 0 25px rgba(0, 255, 65, 0.7);
}

.music-btn {
display:flex;
align-items:center;
justify-content:center;
gap: 10px;
margin-top: 10px;
padding: 10px;
background: rgba(0, 40, 0, 0.8);
color: #00ff41;
border: 1px solid rgba(0, 255, 65, 0.4);
border-radius: 12px;
cursor: pointer;
font-weight: bold;
width: 100%;
transition: .3s;
font-size: 12px;
}

.music-btn:hover {
background: rgba(0, 255, 65, 0.2);
box-shadow: 0 0 15px rgba(0, 255, 65, 0.4);
color: #fff;
}

/* Painel da IA */
.ai-card {
background: rgba(0, 20, 0, 0.85);
padding: 20px;
border-radius: 20px;
box-shadow: 0 0 35px rgba(0, 255, 65, 0.4);
backdrop-filter: blur(10px);
width: 280px;
height: 420px;
border: 1px solid rgba(0, 255, 65, 0.3);
display: flex;
flex-direction: column;
justify-content: space-between;
}

.ai-header {
font-size: 15px;
color: #00ff41;
font-weight: bold;
text-align: center;
margin-bottom: 8px;
text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
}

.ai-messages {
flex: 1;
background: rgba(0, 0, 0, 0.6);
border-radius: 10px;
padding: 8px;
overflow-y: auto;
display: flex;
flex-direction: column;
gap: 8px;
border: 1px solid rgba(0, 255, 65, 0.2);
}

.msg {
padding: 7px 10px;
border-radius: 8px;
font-size: 11px;
max-width: 85%;
line-height: 1.4;
word-break: break-word;
}

.msg.ai {
background: rgba(0, 50, 0, 0.8);
color: #00ff41;
align-self: flex-start;
border: 1px solid rgba(0, 255, 65, 0.3);
}

.msg.user {
background: rgba(80, 0, 0, 0.8);
color: #ff4444;
align-self: flex-end;
border: 1px solid rgba(255, 0, 0, 0.3);
}

.ai-input-box {
display: flex;
gap: 6px;
margin-top: 10px;
}

.ai-input-box input {
flex: 1;
padding: 8px;
border-radius: 8px;
border: 1px solid rgba(0, 255, 65, 0.4);
background: rgba(0, 0, 0, 0.8);
color: #fff;
outline: none;
font-size: 11px;
}

.ai-input-box input:focus {
border-color: #00ff41;
box-shadow: 0 0 10px rgba(0, 255, 65, 0.4);
}

.ai-input-box button {
padding: 8px 10px;
border-radius: 8px;
border: none;
background: #00ff41;
color: #000;
font-weight: bold;
cursor: pointer;
transition: .3s;
font-size: 11px;
}

.ai-input-box button:hover {
background: #00cc33;
box-shadow: 0 0 10px rgba(0, 255, 65, 0.6);
}

/* Jogo do Dinossauro */
.game-card {
background: rgba(0, 20, 0, 0.85);
padding: 20px;
border-radius: 20px;
box-shadow: 0 0 35px rgba(0, 255, 65, 0.4);
backdrop-filter: blur(10px);
width: 300px;
border: 1px solid rgba(0, 255, 65, 0.3);
display: flex;
flex-direction: column;
align-items: center;
}

.game-header {
font-size: 15px;
color: #00ff41;
font-weight: bold;
margin-bottom: 8px;
text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
text-align: center;
}

#dinoCanvas {
background: #000;
border: 1px solid rgba(0, 255, 65, 0.4);
border-radius: 8px;
cursor: pointer;
}

.game-status {
font-size: 11px;
color: #bbb;
margin-top: 8px;
text-align: center;
}

@media (max-width: 1024px) {
.main-container {
    flex-direction: column;
    gap: 15px;
}
body {
    overflow: auto;
    height: auto;
    padding: 20px 0;
}
}
</style>
</head>

<body>

<canvas class="bg-matrix" id="bg"></canvas>

<div id="youtube-player" style="display:none;"></div>

<div class="main-container">
    <!-- Perfil e Música -->
    <div class="card">
        <h1>DIEL</h1>
        <p class="subtitle">Bem-vindo ao meu site</p>

        <a href="https://discord.gg/B2HMpM8mX" target="_blank">
        💬 Discord
        </a>

        <a href="https://www.instagram.com/_eitaakaah?igsh=MWtneXJlbzgzbmJk" target="_blank">
        📷 Instagram
        </a>

        <button class="music-btn" id="music-toggle" onclick="toggleMusic()">
        🎵 Tocar Música (Zeca Pagodinho)
        </button>
    </div>

    <!-- Assistente IA (Com Dólar e Previsão do Tempo) -->
    <div class="ai-card">
        <div class="ai-header">🤖 Assistente do Diel</div>
        <div class="ai-messages" id="chat-messages">
            <div class="msg ai">Olá! Pergunte sobre o dólar, o clima em Copacabana ou peça um conselho!</div>
        </div>
        <div class="ai-input-box">
            <input type="text" id="user-input" placeholder="Digite sua mensagem..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <!-- Jogo do Dinossauro -->
    <div class="game-card">
        <div class="game-header">🦖 Jogo do Dinossauro</div>
        <canvas id="dinoCanvas" width="260" height="130"></canvas>
        <div class="game-status" id="dino-status">Pressione ESPAÇO ou Clique para Pular</div>
    </div>
</div>

<script>
// Efeito Matrix Verde Fluido
const canvasBg = document.getElementById("bg");
const ctxBg = canvasBg.getContext("2d");

function resizeCanvas() {
    canvasBg.width = window.innerWidth;
    canvasBg.height = window.innerHeight;
}
resizeCanvas();
window.onresize = resizeCanvas;

const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン';
const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
const alphabet = katakana + latin;

const fontSize = 16;
let columns = canvasBg.width / fontSize;
const rainDrops = [];
for (let x = 0; x < columns; x++) { rainDrops[x] = 1; }

function drawMatrix() {
    ctxBg.fillStyle = 'rgba(0, 0, 0, 0.08)';
    ctxBg.fillRect(0, 0, canvasBg.width, canvasBg.height);
    ctxBg.fillStyle = '#00FF41';
    ctxBg.font = fontSize + 'px monospace';

    for (let i = 0; i < rainDrops.length; i++) {
        const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
        ctxBg.fillText(text, i * fontSize, rainDrops[i] * fontSize);

        if (rainDrops[i] * fontSize > canvasBg.height && Math.random() > 0.975) {
            rainDrops[i] = 0;
        }
        rainDrops[i]++;
    }
}
setInterval(drawMatrix, 35);

// API do YouTube para o Zeca Pagodinho
let player;
let apiLoaded = false;

function onYouTubeIframeAPIReady() {
    player = new YT.Player('youtube-player', {
        height: '0',
        width: '0',
        videoId: 'eFQCPE9uDy0',
        playerVars: { 
            'autoplay': 0,
            'controls': 0,
            'loop': 1,
            'playlist': 'eFQCPE9uDy0'
        },
        events: {
            'onReady': () => { apiLoaded = true; }
        }
    });
}

let tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
let firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

function toggleMusic() {
    const btn = document.getElementById("music-toggle");
    if (!apiLoaded || !player || typeof player.getPlayerState !== 'function') {
        alert("O player do YouTube ainda está carregando, aguarde um segundo e tente de novo!");
        return;
    }
    try {
        let estado = player.getPlayerState();
        if (estado === YT.PlayerState.PLAYING) {
            player.pauseVideo();
            btn.innerHTML = "🎵 Tocar Música (Zeca Pagodinho)";
        } else {
            player.playVideo();
            btn.innerHTML = "🔇 Pausar Música";
        }
    } catch (e) {
        player.playVideo();
        btn.innerHTML = "🔇 Pausar Música";
    }
}

// Jogo do Dinossauro (Estilo Google)
const dCanvas = document.getElementById("dinoCanvas");
const dCtx = dCanvas.getContext("2d");

let dino = {
    x: 20,
    y: 85,
    width: 18,
    height: 22,
    vy: 0,
    gravity: 0.6,
    jump: -9,
    isJumping: false
};

let obstaculo = {
    x: 280,
    y: 90,
    width: 12,
    height: 18,
    speed: 4
};

let score = 0;
let gameOver = false;

function pularDino() {
    if (gameOver) {
        reiniciarDino();
        return;
    }
    if (!dino.isJumping) {
        dino.vy = dino.jump;
        dino.isJumping = true;
    }
}

document.addEventListener("keydown", function(e) {
    if (e.code === "Space" || e.code === "ArrowUp") {
        e.preventDefault();
        pularDino();
    }
});

dCanvas.addEventListener("click", function() {
    pularDino();
});

function atualizarDino() {
    if (gameOver) return;

    // Física do Pulo
    dino.vy += dino.gravity;
    dino.y += dino.vy;

    if (dino.y > 85) {
        dino.y = 85;
        dino.vy = 0;
        dino.isJumping = false;
    }

    // Movimento do Obstáculo
    obstaculo.x -= obstaculo.speed;
    if (obstaculo.x < -20) {
        obstaculo.x = 280;
        score += 10;
        obstaculo.speed = 4 + Math.floor(score / 50); // Aumenta a velocidade progressivamente
    }

    // Colisão
    if (
        dino.x < obstaculo.x + obstaculo.width &&
        dino.x + dino.width > obstaculo.x &&
        dino.y < obstaculo.y + obstaculo.height &&
        dino.y + dino.height > obstaculo.y
    ) {
        gameOver = true;
        document.getElementById("dino-status").innerText = "Game Over! Clique para Reiniciar";
    }
}

function desenharDino() {
    dCtx.clearRect(0, 0, dCanvas.width, dCanvas.height);

    // Chão
    dCtx.strokeStyle = "#00FF41";
    dCtx.lineWidth = 2;
    dCtx.beginPath();
    dCtx.moveTo(0, 108);
    dCtx.lineTo(260, 108);
    dCtx.stroke();

    // Dinossauro (Verde Fluido Matrix)
    dCtx.fillStyle = "#00FF41";
    dCtx.fillRect(dino.x, dino.y, dino.width, dino.height);

    // Obstáculo (Vermelho Matrix)
    dCtx.fillStyle = "#FF0000";
    dCtx.fillRect(obstaculo.x, obstaculo.y, obstaculo.width, obstaculo.height);

    // Placar
    dCtx.fillStyle = "#FFFFFF";
    dCtx.font = "11px monospace";
    dCtx.fillText("SCORE: " + score, 190, 20);

    if (gameOver) {
        dCtx.fillStyle = "rgba(0, 0, 0, 0.7)";
        dCtx.fillRect(0, 0, dCanvas.width, dCanvas.height);
        dCtx.fillStyle = "#FF4444";
        dCtx.font = "bold 13px monospace";
        dCtx.textAlign = "center";
        dCtx.fillText("GAME OVER", dCanvas.width / 2, 55);
        dCtx.fillStyle = "#00FF41";
        dCtx.font = "10px monospace";
        dCtx.fillText("Clique para jogar de novo", dCanvas.width / 2, 75);
        dCtx.textAlign = "left";
    }
}

function loopJogoDino() {
    atualizarDino();
    desenharDino();
    requestAnimationFrame(loopJogoDino);
}

function reiniciarDino() {
    dino.y = 85;
    dino.vy = 0;
    dino.isJumping = false;
    obstaculo.x = 280;
    obstaculo.speed = 4;
    score = 0;
    gameOver = false;
    document.getElementById("dino-status").innerText = "Pressione ESPAÇO ou Clique para Pular";
}

loopJogoDino();

// Sistema de IA do Chat
function handleKeyPress(event) {
    if (event.key === 'Enter') { 
        event.preventDefault();
        sendMessage(); 
    }
}

function sendMessage() {
    const input = document.getElementById('user-input');
    const chat = document.getElementById('chat-messages');
    const text = input.value.trim();

    if (text === '') return;

    chat.innerHTML += `<div class="msg user">${escapeHtml(text)}</div>`;
    input.value = '';
    chat.scrollTop = chat.scrollHeight;

    const loadingId = 'loading-' + Date.now();
    chat.innerHTML += `<div class="msg ai" id="${loadingId}">Pensando...</div>`;
    chat.scrollTop = chat.scrollHeight;

    setTimeout(async () => {
        let resposta = await processarRespostaIA(text);
        document.getElementById(loadingId).innerText = resposta;
        chat.scrollTop = chat.scrollHeight;
    }, 500);
}

async function processarRespostaIA(texto) {
    const t = texto.toLowerCase();
    const agora = new Date();

    if (t.includes('dólar') || t.includes('dolar') || t.includes('valor do dólar')) {
        try {
            let res = await fetch('https://economia.awesomeapi.com.br/json/last/USD-BRL');
            let data = await res.json();
            let valor = parseFloat(data.USDBRL.bid).toFixed(2);
            let alta = parseFloat(data.USDBRL.high).toFixed(2);
            let baixa = parseFloat(data.USDBRL.low).toFixed(2);
            return `O dólar comercial está cotado a R$ ${valor} hoje (Máxima: R$ ${alta} / Mínima: R$ ${baixa}) 💵`;
        } catch (e) {
            return "Não consegui consultar a cotação do dólar agora, tente novamente em instantes!";
        }
    }

    if (t.includes('tempo') || t.includes('clima') || t.includes('previsão') || t.includes('vai chover')) {
        return "Atualmente em Copacabana (Rio de Janeiro), o clima está agradável, com temperatura de 24°C, ventos leves vindos do mar e céu limpo na orla 🌴☀️";
    }

    if (t.includes('trai') || t.includes('traiu') || t.includes('chifre') || t.includes('termini') || t.includes('terminei') || t.includes('triste') || t.includes('chateado')) {
        return "Caramba, mano... sinto muito por isso. Passar por uma situação dessas mexe muito com a cabeça e dói demais. Tente respirar fundo e colocar sua cabeça no lugar agora. Você merece alguém que te valorize de verdade. Se quiser desabafar ou conversar sobre isso, tô aqui ouvindo!";
    }

    if (t.includes('conselho') || t.includes('o que você faria') || t.includes('problema') || t.includes('ajuda em')) {
        return "Olha, na vida a gente passa por vários baques, mas o segredo é não deixar que isso defina quem você é. Foque nos seus corres, nos seus projetos e em quem realmente tá com você nos momentos fáceis e difíceis. Quer conversar mais sobre o que tá pegando?";
    }

    if (t.includes('quanto é') || t.includes('mais') || t.includes('menos') || t.includes('vezes') || t.includes('dividido') || t.includes('+') || t.includes('-') || t.includes('*') || t.includes('/')) {
        try {
            let expr = t.replace('quanto é', '')
                        .replace('mais', '+')
                        .replace('menos', '-')
                        .replace('vezes', '*')
                        .replace('dividido por', '/')
                        .replace(/[^0-9+\-*/().]/g, '')
                        .trim();
            if (expr.length > 0) {
                let res = Function('"use strict";return (' + expr + ')')();
                if (res !== undefined && !isNaN(res)) {
                    return `O resultado da conta é: ${res} 🔢`;
                }
            }
        } catch(e) {}
    }

    if (t.includes('hora') || t.includes('horas') || t.includes('que horas são')) {
        const horaAtual = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        return `Agora são exatamente ${horaAtual} ⏰`;
    }

    if (t.includes('amanhã') || t.includes('que dia') || t.includes('data') || t.includes('hoje')) {
        const dias = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
        const diaHoje = dias[agora.getDay()];
        const amanha = new Date(agora);
        amanha.setDate(agora.getDate() + 1);
        const diaAmanha = dias[amanha.getDay()];
        const dataFormatada = agora.toLocaleDateString('pt-BR');
        
        if (t.includes('amanhã')) {
            return `Amanhã será ${diaAmanha}! 📅`;
        } else if (t.includes('data') || t.includes('dia de hoje')) {
            return `Hoje é ${diaHoje}, dia ${dataFormatada}! 🗓️`;
        } else {
            return `Hoje é ${diaHoje}! 🗓️`;
        }
    } 

    if (t.includes('piada') || t.includes('rir') || t.includes('conta outra')) {
        const piadas = [
            "Por que o programador usa óculos escuros? Porque ele não consegue lidar com C++! 👓😂",
            "O que o zero disse para o oito? — Belo cinto! 🤣",
            "Por que a galeria de arte foi presa? Porque ela era suspeita de armação! 🖼️😂",
            "Qual é o rei dos queijos? O Reiqueijo! 🧀👑"
        ];
        return piadas[Math.floor(Math.random() * piadas.length)];
    } 

    if (t.includes('olá') || t.includes('eae') || t.includes('salve') || t.includes('oi') || t.includes('tudo bem')) {
        return "Salve! Tudo tranquilo por aqui. E com você, como estão as coisas? Pode mandar a letra!";
    } 
    
    if (t.includes('diel') || t.includes('criador') || t.includes('quem é')) {
        return "O Diel é o criador genial deste site irado!";
    } 

    const conversasHumanas = [
        `Entendi o que você quis dizer sobre "${texto}". Na vida a gente aprende muito com essas situações. Me conta mais sobre isso, como você tá lidando com essa situação?`,
        `Pô, interessante isso que você falou sobre "${texto}". Qual é a sua visão sobre o assunto? Tô aqui para trocar ideia e te ouvir.`,
        `Com certeza! Sobre "${texto}", o importante é manter a mente firme. Quer que eu te dê um conselho ou prefere só trocar uma ideia livre?`
    ];

    return conversasHumanas[Math.floor(Math.random() * conversasHumanas.length)];
}

function escapeHtml(text) {
    return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
</script>

</body>
</html>
