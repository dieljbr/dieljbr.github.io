<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIEL</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
overflow-x:hidden;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:#fff;
}

canvas.bg-matrix{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
pointer-events:none;
}

.main-container {
display: flex;
gap: 15px;
align-items: center;
z-index: 10;
position: relative;
padding: 20px;
}

.card{
background:rgba(0,20,0,.85);
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 0 35px rgba(0, 255, 65, 0.4);
backdrop-filter:blur(10px);
width:260px;
border: 1px solid rgba(0, 255, 65, 0.3);
display: flex;
flex-direction: column;
align-items: center;
}

h1{
font-size:35px;
color:#ff0000;
text-shadow:0 0 25px rgba(255, 0, 0, 0.9);
margin-bottom:3px;
letter-spacing: 2px;
}

.subtitle {
font-size: 12px;
color: #bbb;
margin-bottom: 12px;
}

a{
display:flex;
align-items:center;
justify-content:center;
gap: 8px;
margin:6px 0;
padding:10px;
background:linear-gradient(135deg, #008000, #003300);
color:#fff;
text-decoration:none;
border-radius:10px;
transition:.3s;
font-weight:bold;
width: 100%;
box-shadow: 0 4px 15px rgba(0, 255, 65, 0.3);
font-size: 12px;
}

a:hover{
transform:translateY(-3px);
box-shadow:0 0 25px rgba(0, 255, 65, 0.7);
}

.music-btn {
display:flex;
align-items:center;
justify-content:center;
gap: 8px;
margin-top: 8px;
padding: 10px;
background: rgba(0, 40, 0, 0.8);
color: #00ff41;
border: 1px solid rgba(0, 255, 65, 0.4);
border-radius: 10px;
cursor: pointer;
font-weight: bold;
width: 100%;
transition: .3s;
font-size: 12px;
}

.music-btn:hover {
background: rgba(0, 255, 65, 0.2);
box-shadow: 0 0 15px rgba(0, 255, 65, 0.4);
color: #fff;
}

/* Painel da IA */
.ai-card {
background:rgba(0,20,0,.85);
padding:15px;
border-radius:20px;
box-shadow:0 0 35px rgba(0, 255, 65, 0.4);
backdrop-filter:blur(10px);
width:260px;
height:390px;
border: 1px solid rgba(0, 255, 65, 0.3);
display: flex;
flex-direction: column;
justify-content: space-between;
}

.ai-header {
font-size: 14px;
color: #00ff41;
font-weight: bold;
text-align: center;
margin-bottom: 6px;
text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
}

.ai-messages {
flex: 1;
background: rgba(0, 0, 0, 0.6);
border-radius: 8px;
padding: 6px;
overflow-y: auto;
display: flex;
flex-direction: column;
gap: 6px;
border: 1px solid rgba(0, 255, 65, 0.2);
}

.msg {
padding: 6px 8px;
border-radius: 6px;
font-size: 11px;
max-width: 85%;
line-height: 1.3;
word-break: break-word;
}

.msg.ai {
background: rgba(0, 50, 0, 0.8);
color: #00ff41;
align-self: flex-start;
border: 1px solid rgba(0, 255, 65, 0.3);
}

.msg.user {
background: rgba(80, 0, 0, 0.8);
color: #ff4444;
align-self: flex-end;
border: 1px solid rgba(255, 0, 0, 0.3);
}

.ai-input-box {
display: flex;
gap: 5px;
margin-top: 8px;
}

.ai-input-box input {
flex: 1;
padding: 8px;
border-radius: 6px;
border: 1px solid rgba(0, 255, 65, 0.4);
background: rgba(0, 0, 0, 0.8);
color: #fff;
outline: none;
font-size: 11px;
}

.ai-input-box input:focus {
border-color: #00ff41;
box-shadow: 0 0 10px rgba(0, 255, 65, 0.4);
}

.ai-input-box button {
padding: 8px 10px;
border-radius: 6px;
border: none;
background: #00ff41;
color: #000;
font-weight: bold;
cursor: pointer;
transition: .3s;
font-size: 11px;
}

.ai-input-box button:hover {
background: #00cc33;
box-shadow: 0 0 10px rgba(0, 255, 65, 0.6);
}

/* Jogo da Velha */
.game-card {
background:rgba(0,20,0,.85);
padding:15px;
border-radius:20px;
box-shadow:0 0 35px rgba(0, 255, 65, 0.4);
backdrop-filter:blur(10px);
width:260px;
border: 1px solid rgba(0, 255, 65, 0.3);
display: flex;
flex-direction: column;
align-items: center;
}

.game-header {
font-size: 14px;
color: #00ff41;
font-weight: bold;
margin-bottom: 6px;
text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
text-align: center;
}

.board {
display: grid;
grid-template-columns: repeat(3, 55px);
grid-template-rows: repeat(3, 55px);
gap: 5px;
margin-bottom: 8px;
}

.cell {
background: rgba(0, 0, 0, 0.8);
border: 1px solid rgba(0, 255, 65, 0.4);
border-radius: 6px;
font-size: 26px;
font-weight: bold;
color: #00ff41;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
user-select: none;
}

.cell.x {
color: #ff4444;
}

.game-status {
font-size: 11px;
color: #fff;
margin-bottom: 6px;
height: 16px;
text-align: center;
}

.reset-btn {
padding: 7px 12px;
border-radius: 6px;
border: none;
background: #00ff41;
color: #000;
font-weight: bold;
cursor: pointer;
font-size: 11px;
transition: .3s;
}

.reset-btn:hover {
background: #00cc33;
box-shadow: 0 0 10px rgba(0, 255, 65, 0.6);
}

#dinoCanvas {
background: #000;
border: 1px solid rgba(0, 255, 65, 0.4);
border-radius: 6px;
cursor: pointer;
margin-bottom: 6px;
touch-action: manipulation;
}

@media (max-width: 1100px) {
.main-container {
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
    height: auto;
}
body {
    overflow-y: auto;
    height: auto;
    padding: 20px 0;
}
}
</style>
</head>

<body>

<canvas class="bg-matrix" id="bg"></canvas>

<div id="youtube-player" style="display:none;"></div>

<div class="main-container">
    <!-- Perfil e Música -->
    <div class="card">
        <h1>DIEL</h1>
        <p class="subtitle">Bem-vindo ao meu site</p>

        <a href="https://discord.gg/B2HMpM8mX" target="_blank">
        💬 Discord
        </a>

        <a href="https://www.instagram.com/_eitaakaah?igsh=MWtneXJlbzgzbmJk" target="_blank">
        📷 Instagram
        </a>

        <button class="music-btn" id="music-toggle" type="button">
        🎵 Tocar Música (Zeca Pagodinho)
        </button>
    </div>

    <!-- Assistente IA -->
    <div class="ai-card">
        <div class="ai-header">🤖 Assistente do Diel</div>
        <div class="ai-messages" id="chat-messages">
            <div class="msg ai">E aí, Diel! Manda a braba, o que quer trocar ideia hoje?</div>
        </div>
        <div class="ai-input-box">
            <input type="text" id="user-input" placeholder="Digite sua mensagem...">
            <button id="send-btn" type="button">Enviar</button>
        </div>
    </div>

    <!-- Jogo da Velha (Diel vs Você) -->
    <div class="game-card">
        <div class="game-header">🎮 Diel vs Você</div>
        <div class="game-status" id="game-status">Sua vez (X)</div>
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        <button class="reset-btn" id="reset-board" type="button">Reiniciar Jogo</button>
    </div>

    <!-- Jogo do Diel -->
    <div class="game-card">
        <div class="game-header">🎮 Jogo do Diel</div>
        <canvas id="dinoCanvas" width="220" height="80"></canvas>
        <div class="game-status" id="dino-status">Clique em Começar</div>
        <button class="reset-btn" id="start-btn" type="button">▶ Começar / Pular</button>
    </div>
</div>

<script>
// Efeito Matrix Verde Fluido
const canvasBg = document.getElementById("bg");
const ctxBg = canvasBg.getContext("2d");

function resizeCanvas() {
    canvasBg.width = window.innerWidth;
    canvasBg.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン';
const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
const alphabet = katakana + latin;

const fontSize = 16;
let columns = canvasBg.width / fontSize;
const rainDrops = [];
for (let x = 0; x < columns; x++) { rainDrops[x] = 1; }

function drawMatrix() {
    ctxBg.fillStyle = 'rgba(0, 0, 0, 0.08)';
    ctxBg.fillRect(0, 0, canvasBg.width, canvasBg.height);
    ctxBg.fillStyle = '#00FF41';
    ctxBg.font = fontSize + 'px monospace';

    for (let i = 0; i < rainDrops.length; i++) {
        const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
        ctxBg.fillText(text, i * fontSize, rainDrops[i] * fontSize);

        if (rainDrops[i] * fontSize > canvasBg.height && Math.random() > 0.975) {
            rainDrops[i] = 0;
        }
        rainDrops[i]++;
    }
}
setInterval(drawMatrix, 35);

// API do YouTube para o Zeca Pagodinho
let player;
let apiLoaded = false;

function onYouTubeIframeAPIReady() {
    player = new YT.Player('youtube-player', {
        height: '0',
        width: '0',
        videoId: 'eFQCPE9uDy0',
        playerVars: { 
            'autoplay': 0,
            'controls': 0,
            'loop': 1,
            'playlist': 'eFQCPE9uDy0'
        },
        events: {
            'onReady': () => { apiLoaded = true; }
        }
    });
}

let tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
let firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

document.getElementById("music-toggle").addEventListener("click", function() {
    const btn = this;
    if (!apiLoaded || !player || typeof player.getPlayerState !== 'function') {
        alert("O player ainda está carregando, tente em 2 segundos!");
        return;
    }
    try {
        let estado = player.getPlayerState();
        if (estado === YT.PlayerState.PLAYING) {
            player.pauseVideo();
            btn.innerHTML = "🎵 Tocar Música (Zeca Pagodinho)";
        } else {
            player.playVideo();
            btn.innerHTML = "🔇 Pausar Música";
        }
    } catch (e) {
        player.playVideo();
        btn.innerHTML = "🔇 Pausar Música";
    }
});

// Jogo da Velha (Diel vs Você)
let tabuleiro = ['', '', '', '', '', '', '', '', ''];
let jogoAtivo = true;

const cells = document.querySelectorAll('.cell');
cells.forEach(cell => {
    cell.addEventListener('click', function() {
        let index = parseInt(this.getAttribute('data-index'));
        fazerJogada(index);
    });
});

document.getElementById('reset-board').addEventListener('click', reiniciarJogo);

function fazerJogada(index) {
    if (tabuleiro[index] === '' && jogoAtivo) {
        tabuleiro[index] = 'X';
        atualizarTabuleiro();
        
        if (verificarFimDeJogo('X')) return;
        
        document.getElementById('game-status').innerText = "Diel pensando...";
        jogoAtivo = false;
        
        setTimeout(() => {
            let jogadaIA = escolherJogadaIA();
            if (jogadaIA !== -1) {
                tabuleiro[jogadaIA] = 'O';
            }
            atualizarTabuleiro();
            if (!verificarFimDeJogo('O')) {
                document.getElementById('game-status').innerText = "Sua vez (X)";
                jogoAtivo = true;
            }
        }, 400);
    }
}

function atualizarTabuleiro() {
    cells.forEach((cell, i) => {
        cell.innerText = tabuleiro[i];
        if (tabuleiro[i] === 'X') {
            cell.classList.add('x');
        } else {
            cell.classList.remove('x');
        }
    });
}

function escolherJogadaIA() {
    for (let i = 0; i < 9; i++) {
        if (tabuleiro[i] === '') {
            tabuleiro[i] = 'O';
            if (checarVitoria('O')) { tabuleiro[i] = ''; return i; }
            tabuleiro[i] = '';
        }
    }
    for (let i = 0; i < 9; i++) {
        if (tabuleiro[i] === '') {
            tabuleiro[i] = 'X';
            if (checarVitoria('X')) { tabuleiro[i] = ''; return i; }
            tabuleiro[i] = '';
        }
    }
    if (tabuleiro[4] === '') return 4;
    let vazias = [];
    for (let i = 0; i < 9; i++) {
        if (tabuleiro[i] === '') vazias.push(i);
    }
    if (vazias.length > 0) {
        return vazias[Math.floor(Math.random() * vazias.length)];
    }
    return -1;
}

function checarVitoria(jogador) {
    const combinacoes = [
        [0,1,2], [3,4,5], [6,7,8],
        [0,3,6], [1,4,7], [2,5,8],
        [0,4,8], [2,4,6]
    ];
    return combinacoes.some(comb => 
        tabuleiro[comb[0]] === jogador && 
        tabuleiro[comb[1]] === jogador && 
        tabuleiro[comb[2]] === jogador
    );
}

function verificarFimDeJogo(jogador) {
    if (checarVitoria(jogador)) {
        document.getElementById('game-status').innerText = jogador === 'X' ? "Você venceu o Diel! 🎉" : "O Diel venceu! 😎";
        jogoAtivo = false;
        return true;
    }
    if (!tabuleiro.includes('')) {
        document.getElementById('game-status').innerText = "Empate! 🤝";
        jogoAtivo = false;
        return true;
    }
    return false;
}

function reiniciarJogo() {
    tabuleiro = ['', '', '', '', '', '', '', '', ''];
    jogoAtivo = true;
    document.getElementById('game-status').innerText = "Sua vez (X)";
    atualizarTabuleiro();
}

// Jogo do Diel
const dCanvas = document.getElementById("dinoCanvas");
const dCtx = dCanvas.getContext("2d");

let dino = {
    x: 20,
    y: 48,
    width: 16,
    height: 18,
    vy: 0,
    gravity: 0.5,
    jump: -7.5,
    isJumping: false
};

let obstaculo = {
    x: 220,
    y: 50,
    width: 10,
    height: 16,
    speed: 3.5
};

let score = 0;
let recorde = 0;
let jogoRodando = false;
let gameOver = false;

function pularDino() {
    if (!jogoRodando || gameOver) {
        iniciarOuReiniciarJogoD();
        return;
    }
    if (!dino.isJumping) {
        dino.vy = dino.jump;
        dino.isJumping = true;
    }
}

document.addEventListener("keydown", function(e) {
    if (e.code === "Space" || e.code === "ArrowUp") {
        if (document.activeElement.id !== 'user-input') {
            e.preventDefault();
            pularDino();
        }
    }
});

dCanvas.addEventListener("click", pularDino);
document.getElementById("start-btn").addEventListener("click", pularDino);

function iniciarOuReiniciarJogoD() {
    dino.y = 48;
    dino.vy = 0;
    dino.isJumping = false;
    obstaculo.x = 220;
    obstaculo.speed = 3.5;
    score = 0;
    gameOver = false;
    jogoRodando = true;
    document.getElementById("dino-status").innerText = "Pulando... Vamos lá!";
    document.getElementById("start-btn").innerText = "Pular";
}

function atualizarDino() {
    if (!jogoRodando || gameOver) return;

    dino.vy += dino.gravity;
    dino.y += dino.vy;

    if (dino.y > 48) {
        dino.y = 48;
        dino.vy = 0;
        dino.isJumping = false;
    }

    obstaculo.x -= obstaculo.speed;
    if (obstaculo.x < -20) {
        obstaculo.x = 220;
        score += 10;
        obstaculo.speed = 3.5 + Math.floor(score / 50);
    }

    if (
        dino.x < obstaculo.x + obstaculo.width &&
        dino.x + dino.width > obstaculo.x &&
        dino.y < obstaculo.y + obstaculo.height &&
        dino.y + dino.height > obstaculo.y
    ) {
        gameOver = true;
        jogoRodando = false;
        if (score > recorde) recorde = score;
        document.getElementById("dino-status").innerText = `Game Over! Pontos: ${score}`;
        document.getElementById("start-btn").innerText = "Jogar de Novo";
    }
}

function desenharDino() {
    dCtx.clearRect(0, 0, dCanvas.width, dCanvas.height);

    dCtx.strokeStyle = "#00FF41";
    dCtx.lineWidth = 2;
    dCtx.beginPath();
    dCtx.moveTo(0, 66);
    dCtx.lineTo(220, 66);
    dCtx.stroke();

    dCtx.fillStyle = "#00FF41";
    dCtx.font = "bold 18px monospace";
    dCtx.fillText("D", dino.x, dino.y + 14);

    dCtx.fillStyle = "#FF0000";
    dCtx.fillRect(obstaculo.x, obstaculo.y, obstaculo.width, obstaculo.height);

    dCtx.fillStyle = "#FFFFFF";
    dCtx.font = "9px monospace";
    dCtx.fillText("PTS: " + score, 10, 15);
    dCtx.fillText("TOP: " + recorde, 140, 15);

    if (!jogoRodando && !gameOver) {
        dCtx.fillStyle = "rgba(0, 0, 0, 0.75)";
        dCtx.fillRect(0, 0, dCanvas.width, dCanvas.height);
        dCtx.fillStyle = "#00FF41";
        dCtx.font = "bold 11px monospace";
        dCtx.textAlign = "center";
        dCtx.fillText("CLIQUE EM COMEÇAR", dCanvas.width / 2, 45);
        dCtx.textAlign = "left";
    }

    if (gameOver) {
        dCtx.fillStyle = "rgba(0, 0, 0, 0.75)";
        dCtx.fillRect(0, 0, dCanvas.width, dCanvas.height);
        dCtx.fillStyle = "#FF4444";
        dCtx.font = "bold 11px monospace";
        dCtx.textAlign = "center";
        dCtx.fillText("GAME OVER", dCanvas.width / 2, 38);
        dCtx.fillStyle = "#00FF41";
        dCtx.font = "8px monospace";
        dCtx.fillText("Clique em Jogar de Novo", dCanvas.width / 2, 55);
        dCtx.textAlign = "left";
    }
}

function loopJogoDino() {
    atualizarDino();
    desenharDino();
    requestAnimationFrame(loopJogoDino);
}

loopJogoDino();

// Sistema de IA do Chat Turbo (Muito mais inteligente e natural)
document.getElementById("send-btn").addEventListener("click", sendMessage);
document.getElementById("user-input").addEventListener("keypress", function(event) {
    if (event.key === 'Enter') { 
        event.preventDefault();
        sendMessage(); 
    }
});

function sendMessage() {
    const input = document.getElementById('user-input');
    const chat = document.getElementById('chat-messages');
    const text = input.value.trim();

    if (text === '') return;

    chat.innerHTML += `<div class="msg user">${escapeHtml(text)}</div>`;
    input.value = '';
    chat.scrollTop = chat.scrollHeight;

    const loadingId = 'loading-' + Date.now();
    chat.innerHTML += `<div class="msg ai" id="${loadingId}">Pensando...</div>`;
    chat.scrollTop = chat.scrollHeight;

    setTimeout(() => {
        let resposta = processarRespostaIA(text);
        document.getElementById(loadingId).innerText = resposta;
        chat.scrollTop = chat.scrollHeight;
    }, 300);
}

function processarRespostaIA(texto) {
    const t = texto.toLowerCase();
    const agora = new Date();

    // Dólar
    if (t.includes('dólar') || t.includes('dolar') || t.includes('cotação') || t.includes('moeda')) {
        return "O dólar comercial está cotado em média a R$ 5,50 hoje 💵 Quer saber alguma outra cotação?";
    }

    // Previsão do tempo
    if (t.includes('tempo') || t.includes('clima') || t.includes('previsão') || t.includes('vai chover') || t.includes('sol')) {
        return "Atualmente em Copacabana (Rio de Janeiro), o clima está agradável, com temperatura de 24°C, ventos leves e céu limpo 🌴☀️";
    }

    // Desabafo / Relacionamento / Tristeza
    if (t.includes('trai') || t.includes('traiu') || t.includes('chifre') || t.includes('termini') || t.includes('terminei') || t.includes('triste') || t.includes('chateado') || t.includes('deprê') || t.includes('mal')) {
        return "Pô, mano... sinto muito mesmo por isso. Passar por uma situação dessas mexe muito com a cabeça e dói. Respira fundo, foca em você e em quem realmente te valoriza de verdade. Tô aqui se quiser trocar ideia!";
    }

    // Conselhos / Ajuda
    if (t.includes('conselho') || t.includes('o que fazer') || t.includes('ajuda') || t.includes('dica')) {
        return "Olha, na vida a gente passa por vários baques, mas o segredo é não deixar que isso te derrube. Mantenha a cabeça erguida, foca nos seus corres e nos seus projetos!";
    }

    // Matemática / Contas
    if (t.includes('quanto é') || t.includes('mais') || t.includes('menos') || t.includes('vezes') || t.includes('dividido') || t.includes('+') || t.includes('-') || t.includes('*') || t.includes('/')) {
        try {
            let expr = t.replace('quanto é', '')
                        .replace('mais', '+')
                        .replace('menos', '-')
                        .replace('vezes', '*')
                        .replace('dividido por', '/')
                        .replace(/[^0-9
