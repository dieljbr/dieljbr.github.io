<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIEL</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.main-container {
display: flex;
gap: 30px;
align-items: center;
z-index: 10;
}

.card{
background:rgba(0,20,0,.85);
padding:35px;
border-radius:20px;
text-align:center;
box-shadow:0 0 35px rgba(0, 255, 65, 0.4);
backdrop-filter:blur(10px);
width:360px;
border: 1px solid rgba(0, 255, 65, 0.3);
display: flex;
flex-direction: column;
align-items: center;
}

h1{
font-size:55px;
color:#ff0000;
text-shadow:0 0 25px rgba(255, 0, 0, 0.9);
margin-bottom:8px;
letter-spacing: 2px;
}

.subtitle {
font-size: 15px;
color: #bbb;
margin-bottom: 25px;
margin-top: 10px;
}

a{
display:flex;
align-items:center;
justify-content:center;
gap: 10px;
margin:12px 0;
padding:14px;
background:linear-gradient(135deg, #008000, #003300);
color:#fff;
text-decoration:none;
border-radius:12px;
transition:.3s;
font-weight:bold;
width: 100%;
box-shadow: 0 4px 15px rgba(0, 255, 65, 0.3);
}

a:hover{
transform:translateY(-3px);
box-shadow:0 0 25px rgba(0, 255, 65, 0.7);
}

.music-btn {
display:flex;
align-items:center;
justify-content:center;
gap: 10px;
margin-top: 20px;
padding: 12px;
background: rgba(0, 40, 0, 0.8);
color: #00ff41;
border: 1px solid rgba(0, 255, 65, 0.4);
border-radius: 12px;
cursor: pointer;
font-weight: bold;
width: 100%;
transition: .3s;
}

.music-btn:hover {
background: rgba(0, 255, 65, 0.2);
box-shadow: 0 0 15px rgba(0, 255, 65, 0.4);
color: #fff;
}

/* Painel da IA Real */
.ai-card {
background: rgba(0, 20, 0, 0.85);
padding: 25px;
border-radius: 20px;
box-shadow: 0 0 35px rgba(0, 255, 65, 0.4);
backdrop-filter: blur(10px);
width: 360px;
height: 440px;
border: 1px solid rgba(0, 255, 65, 0.3);
display: flex;
flex-direction: column;
justify-content: space-between;
}

.ai-header {
font-size: 18px;
color: #00ff41;
font-weight: bold;
text-align: center;
margin-bottom: 12px;
text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
}

.ai-messages {
flex: 1;
background: rgba(0, 0, 0, 0.6);
border-radius: 10px;
padding: 10px;
overflow-y: auto;
display: flex;
flex-direction: column;
gap: 10px;
border: 1px solid rgba(0, 255, 65, 0.2);
}

.msg {
padding: 8px 12px;
border-radius: 8px;
font-size: 13px;
max-width: 85%;
line-height: 1.4;
word-break: break-word;
}

.msg.ai {
background: rgba(0, 50, 0, 0.8);
color: #00ff41;
align-self: flex-start;
border: 1px solid rgba(0, 255, 65, 0.3);
}

.msg.user {
background: rgba(80, 0, 0, 0.8);
color: #ff4444;
align-self: flex-end;
border: 1px solid rgba(255, 0, 0, 0.3);
}

.ai-input-box {
display: flex;
gap: 8px;
margin-top: 12px;
}

.ai-input-box input {
flex: 1;
padding: 10px;
border-radius: 8px;
border: 1px solid rgba(0, 255, 65, 0.4);
background: rgba(0, 0, 0, 0.8);
color: #fff;
outline: none;
font-size: 13px;
}

.ai-input-box input:focus {
border-color: #00ff41;
box-shadow: 0 0 10px rgba(0, 255, 65, 0.4);
}

.ai-input-box button {
padding: 10px 15px;
border-radius: 8px;
border: none;
background: #00ff41;
color: #000;
font-weight: bold;
cursor: pointer;
transition: .3s;
}

.ai-input-box button:hover {
background: #00cc33;
box-shadow: 0 0 10px rgba(0, 255, 65, 0.6);
}

@media (max-width: 768px) {
.main-container {
    flex-direction: column;
    gap: 20px;
}
body {
    overflow: auto;
    height: auto;
    padding: 20px 0;
}
}
</style>

<!-- Biblioteca Google Generative AI (Gemini SDK) -->
<script type="importmap">
  {
    "imports": {
      "@google/genai": "https://esm.run/@google/genai"
    }
  }
</script>
</head>

<body>

<canvas id="bg"></canvas>

<!-- Player do YouTube Oculto -->
<div id="youtube-player" style="display:none;"></div>

<div class="main-container">
    <!-- Card Principal -->
    <div class="card">
        <h1>DIEL</h1>
        <p class="subtitle">Bem-vindo ao meu site</p>

        <a href="https://discord.gg/B2HMpM8mX" target="_blank">
        💬 Discord
        </a>

        <a href="https://www.instagram.com/_eitaakaah?igsh=MWtneXJlbzgzbmJk" target="_blank">
        📷 Instagram
        </a>

        <button class="music-btn" id="music-toggle" onclick="toggleMusic()">
        🎵 Tocar Música (Zeca Pagodinho)
        </button>
    </div>

    <!-- Card de IA Real -->
    <div class="ai-card">
        <div class="ai-header">🤖 IA Inteligente do Diel</div>
        <div class="ai-messages" id="chat-messages">
            <div class="msg ai">E aí! Pode perguntar qualquer coisa que agora eu penso de verdade e te respondo certo.</div>
        </div>
        <div class="ai-input-box">
            <input type="text" id="user-input" placeholder="Faça uma pergunta inteligente..." onkeypress="handleKeyPress(event)">
            <button onclick="sendToGeminiAI()">Enviar</button>
        </div>
    </div>
</div>

<script>
// Chuva Matrix Verde
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.onresize = resizeCanvas;

const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン';
const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
const alphabet = katakana + latin;

const fontSize = 16;
let columns = canvas.width / fontSize;
const rainDrops = [];
for (let x = 0; x < columns; x++) { rainDrops[x] = 1; }

function drawMatrix() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00FF41';
    ctx.font = fontSize + 'px monospace';

    for (let i = 0; i < rainDrops.length; i++) {
        const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
        ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
        if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            rainDrops[i] = 0;
        }
        rainDrops[i]++;
    }
}
setInterval(drawMatrix, 30);

// API do YouTube
let player;
let isPlaying = false;
function onYouTubeIframeAPIReady() {
    player = new YT.Player('youtube-player', {
        height: '0',
        width: '0',
        videoId: 'eFQCPE9uDy0',
        playerVars: { 'loop': 1, 'playlist': 'eFQCPE9uDy0' }
    });
}
let tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
let firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

function toggleMusic() {
    const btn = document.getElementById("music-toggle");
    if (!player) return;
    if (isPlaying) {
        player.pauseVideo();
        btn.innerHTML = "🎵 Tocar Música (Zeca Pagodinho)";
        isPlaying = false;
    } else {
        player.playVideo();
        btn.innerHTML = "🔇 Pausar Música";
        isPlaying = true;
    }
}

// Conexão com o Google Gemini (IA Real e Pensante)
import { GoogleGenAI } from "@google/genai";

// Insira sua chave de API do Gemini aqui dentro das aspas caso queira que funcione online na web
const ai = new GoogleGenAI({ apiKey: "COLOQUE_SUA_API_KEY_AQUI" });

function handleKeyPress(event) {
    if (event.key === 'Enter') { sendToGeminiAI(); }
}

async function sendToGeminiAI() {
    const input = document.getElementById('user-input');
    const chat = document.getElementById('chat-messages');
    const text = input.value.trim();

    if (text === '') return;

    chat.innerHTML += `<div class="msg user">${escapeHtml(text)}</div>`;
    input.value = '';
    chat.scrollTop = chat.scrollHeight;

    const loadingId = 'loading-' + Date.now();
    chat.innerHTML += `<div class="msg ai" id="${loadingId}">Pensando...</div>`;
    chat.scrollTop = chat.scrollHeight;

    try {
        const response = await ai.models.generateContent({
            model: 'gemini-2.5-flash',
            contents: text,
            config: {
                systemInstruction: "Você é um assistente de IA amigável e inteligente integrado ao site pessoal de Diel. Responda de forma clara, prestativa e direta em português.",
            }
        });

        document.getElementById(loadingId).innerText = response.text;
        chat.scrollTop = chat.scrollHeight;
    } catch (error) {
        document.getElementById(loadingId).innerText = "Erro: Para usar a IA real, insira uma chave de API válida do Gemini no código.";
    }
}

function escapeHtml(text) {
    return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
</script>

</body>
</html>
