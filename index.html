<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIEL</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.card{
background:rgba(20,0,0,.85);
padding:35px;
border-radius:20px;
text-align:center;
box-shadow:0 0 35px rgba(255, 0, 0, 0.4);
backdrop-filter:blur(10px);
width:360px;
border: 1px solid rgba(255, 0, 0, 0.3);
}

h1{
font-size:48px;
color:#ff0000;
text-shadow:0 0 25px rgba(255, 0, 0, 0.9);
margin-bottom:8px;
animation:pulse 2s infinite;
letter-spacing: 2px;
}

.subtitle {
font-size: 15px;
color: #bbb;
margin-bottom: 25px;
}

a{
display:flex;
align-items:center;
justify-content:center;
gap: 10px;
margin:12px 0;
padding:14px;
background:linear-gradient(135deg, #ff0000, #8b0000);
color:#fff;
text-decoration:none;
border-radius:12px;
transition:.3s;
font-weight:bold;
box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
}

a:hover{
transform:translateY(-3px);
box-shadow:0 0 25px rgba(255, 0, 0, 0.7);
}

.music-btn {
display:flex;
align-items:center;
justify-content:center;
gap: 10px;
margin-top: 20px;
padding: 12px;
background: rgba(40, 0, 0, 0.8);
color: #ff4444;
border: 1px solid rgba(255, 0, 0, 0.4);
border-radius: 12px;
cursor: pointer;
font-weight: bold;
width: 100%;
transition: .3s;
}

.music-btn:hover {
background: rgba(255, 0, 0, 0.2);
box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
color: #fff;
}

@keyframes pulse{
50%{
text-shadow:0 0 40px #ff4444;
transform: scale(1.02);
}
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- Elemento de áudio com música eletrônica em loop via API pública -->
<audio id="bg-music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf756.mp3?filename=cyberpunk-2099-10701.mp3" type="audio/mpeg">
  Seu navegador não suporta áudio.
</audio>

<div class="card">

<h1>DIEL</h1>
<p class="subtitle">Bem-vindo ao meu site</p>

<a href="https://discord.gg/B2HMpM8mX" target="_blank">
💬 Discord
</a>

<a href="https://www.instagram.com/_eitaakaah?igsh=MWtneXJlbzgzbmJk" target="_blank">
📷 Instagram
</a>

<button class="music-btn" id="music-toggle" onclick="toggleMusic()">
🔊 Tocar Música Eletrônica
</button>

</div>

<script>
// Efeito de Chuva Matrix Vermelha
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.onresize = resizeCanvas;

const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン';
const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
const alphabet = katakana + latin;

const fontSize = 16;
let columns = canvas.width / fontSize;

const rainDrops = [];
for (let x = 0; x < columns; x++) {
    rainDrops[x] = 1;
}

function drawMatrix() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#FF0000'; // Vermelho Matrix
    ctx.font = fontSize + 'px monospace';

    for (let i = 0; i < rainDrops.length; i++) {
        const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
        ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

        if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            rainDrops[i] = 0;
        }
        rainDrops[i]++;
    }
}

setInterval(drawMatrix, 30);

// Controle de Música
const music = document.getElementById("bg-music");
const musicBtn = document.getElementById("music-toggle");
let isPlaying = false;

function toggleMusic() {
    if (isPlaying) {
        music.pause();
        musicBtn.innerHTML = "🔊 Tocar Música Eletrônica";
        isPlaying = false;
    } else {
        music.play().then(() => {
            musicBtn.innerHTML = "🔇 Pausar Música";
            isPlaying = true;
        }).catch(error => {
            console.log("Erro ao reproduzir áudio automaticamente:", error);
            alert("Clique em qualquer lugar da página ou tente novamente para ativar o áudio.");
        });
    }
}

// Tenta iniciar a música automaticamente ao carregar (alguns navegadores bloqueiam autoplay sem interação)
window.addEventListener('click', () => {
    if (!isPlaying) {
        music.play().then(() => {
            musicBtn.innerHTML = "🔇 Pausar Música";
            isPlaying = true;
        }).catch(() => {});
    }
}, { once: true });
</script>

</body>
</html>
