<head>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
}

canvas{
position:fixed;
top:0;
left:0;

height:100%;

}

.card{
background:rgba(0,20,0,.85);
padding:35px;
border-radius:20px;
text-align:center;
box-shadow:0 0 35px rgba(0, 255, 65, 0.4);
backdrop-filter:blur(10px);

border: 1px solid rgba(0, 255, 65, 0.3);
display: flex;
flex-direction: column;
align-items: center;
}

h1{
font-size:55px;
color:#ff0000;
text-shadow:0 0 25px rgba(255, 0, 0, 0.9);
margin-bottom:8px;
letter-spacing: 2px;
}

.subtitle {
font-size: 15px;
color: #bbb;
margin-bottom: 25px;
margin-top: 10px;
}

a{
display:flex;
align-items:center;
justify-content:center;
gap: 10px;
margin:12px 0;
padding:14px;
background:linear-gradient(135deg, #008000, #003300);
color:#fff;
text-decoration:none;
border-radius:12px;
transition:.3s;
font-weight:bold;
width: 100%;
box-shadow: 0 4px 15px rgba(0, 255, 65, 0.3);
}

a:hover{
transform:translateY(-3px);
box-shadow:0 0 25px rgba(0, 255, 65, 0.7);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- Player de Música Flutuante no Canto da Tela -->
<div style="position:fixed; bottom:20px; right:20px; z-index:999; background:rgba(0,0,0,0.9); padding:12px; border-radius:12px; border:1px solid #00ff41; box-shadow: 0 0 15px rgba(0,255,65,0.4);">
  <p style="color:#00ff41; font-size:13px; margin-bottom:6px; text-align:center; font-weight:bold;">🎵 Zeca Pagodinho - Caviar</p>
  <audio controls loop preload="auto" style="width:240px; height:40px;">
    <source src="https://www.youtube.com/watch?v=eFQCPE9uDy0" type="audio/mp4">
    <source src="http://www.youtube.com/watch?v=eFQCPE9uDy0" type="audio/mpeg">
    Seu navegador não suporta áudio.
  </audio>
</div>

<div class="card">

    <h1>DIEL</h1>

<p class="subtitle">Bem-vindo ao meu site</p>

<a href="https://discord.gg/B2HMpM8mX" target="_blank">
💬 Discord
</a>

<a href="https://www.instagram.com/_eitaakaah?igsh=MWtneXJlbzgzbmJk" target="_blank">
📷 Instagram
</a>

</div>

<script>
// Efeito de Chuva Matrix Verde Clássica
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.onresize = resizeCanvas;

const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン';
const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
const alphabet = katakana + latin;

const fontSize = 16;
let columns = canvas.width / fontSize;

const rainDrops = [];
for (let x = 0; x < columns; x++) {
    rainDrops[x] = 1;
}

function drawMatrix() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#00FF41';
    ctx.font = fontSize + 'px monospace';

    for (let i = 0; i < rainDrops.length; i++) {
        const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
        ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

        if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            rainDrops[i] = 0;
        }
        rainDrops[i]++;
    }
}

setInterval(drawMatrix, 30);
</script>

</body>
</html>
