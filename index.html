<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIEL</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.card{
background:rgba(0,20,0,.85);
padding:35px;
border-radius:20px;
text-align:center;
box-shadow:0 0 35px rgba(0, 255, 65, 0.4);
backdrop-filter:blur(10px);
width:360px;
border: 1px solid rgba(0, 255, 65, 0.3);
display: flex;
flex-direction: column;
align-items: center;
}

h1{
font-size:55px;
color:#ff0000;
text-shadow:0 0 25px rgba(255, 0, 0, 0.9);
margin-bottom:8px;
letter-spacing: 2px;
}

.subtitle {
font-size: 15px;
color: #bbb;
margin-bottom: 25px;
margin-top: 10px;
}

a{
display:flex;
align-items:center;
justify-content:center;
gap: 10px;
margin:12px 0;
padding:14px;
background:linear-gradient(135deg, #008000, #003300);
color:#fff;
text-decoration:none;
border-radius:12px;
transition:.3s;
font-weight:bold;
width: 100%;
box-shadow: 0 4px 15px rgba(0, 255, 65, 0.3);
}

a:hover{
transform:translateY(-3px);
box-shadow:0 0 25px rgba(0, 255, 65, 0.7);
}

.music-btn {
display:flex;
align-items:center;
justify-content:center;
gap: 10px;
margin-top: 20px;
padding: 12px;
background: rgba(0, 40, 0, 0.8);
color: #00ff41;
border: 1px solid rgba(0, 255, 65, 0.4);
border-radius: 12px;
cursor: pointer;
font-weight: bold;
width: 100%;
transition: .3s;
}

.music-btn:hover {
background: rgba(0, 255, 65, 0.2);
box-shadow: 0 0 15px rgba(0, 255, 65, 0.4);
color: #fff;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- Player do YouTube Oculto que roda a música -->
<div id="youtube-player" style="display:none;"></div>

<div class="card">

    <h1>DIEL</h1>

<p class="subtitle">Bem-vindo ao meu site</p>

<a href="https://discord.gg/B2HMpM8mX" target="_blank">
💬 Discord
</a>

<a href="https://www.instagram.com/_eitaakaah?igsh=MWtneXJlbzgzbmJk" target="_blank">
📷 Instagram
</a>

<button class="music-btn" id="music-toggle" onclick="toggleMusic()">
🎵 Tocar Música (Zeca Pagodinho)
</button>

</div>

<script>
// Efeito de Chuva Matrix Verde Clássica
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.onresize = resizeCanvas;

const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン';
const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
const alphabet = katakana + latin;

const fontSize = 16;
let columns = canvas.width / fontSize;

const rainDrops = [];
for (let x = 0; x < columns; x++) {
    rainDrops[x] = 1;
}

function drawMatrix() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#00FF41';
    ctx.font = fontSize + 'px monospace';

    for (let i = 0; i < rainDrops.length; i++) {
        const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
        ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

        if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            rainDrops[i] = 0;
        }
        rainDrops[i]++;
    }
}

setInterval(drawMatrix, 30);

// API Oficial do YouTube para controlar a música via botão
let player;
let isPlaying = false;

function onYouTubeIframeAPIReady() {
    player = new YT.Player('youtube-player', {
        height: '0',
        width: '0',
        videoId: 'eFQCPE9uDy0',
        playerVars: {
            'loop': 1,
            'playlist': 'eFQCPE9uDy0'
        }
    });
}

// Carrega o script da API do YouTube automaticamente
let tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
let firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

function toggleMusic() {
    const btn = document.getElementById("music-toggle");
    if (!player) return;
    
    if (isPlaying) {
        player.pauseVideo();
        btn.innerHTML = "🎵 Tocar Música (Zeca Pagodinho)";
        isPlaying = false;
    } else {
        player.playVideo();
        btn.innerHTML = "🔇 Pausar Música";
        isPlaying = true;
    }
}
</script>

</body>
</html>
