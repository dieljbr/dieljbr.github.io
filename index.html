<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIEL</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
pointer-events:none;
}

.main-container {
display: flex;
gap: 30px;
align-items: center;
z-index: 10;
position: relative;
}

.card{
background:rgba(0,20,0,.85);
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 35px rgba(0, 255, 65, 0.4);
backdrop-filter:blur(10px);
width:360px;
border: 1px solid rgba(0, 255, 65, 0.3);
display: flex;
flex-direction: column;
align-items: center;
}

h1{
font-size:50px;
color:#ff0000;
text-shadow:0 0 25px rgba(255, 0, 0, 0.9);
margin-bottom:5px;
letter-spacing: 2px;
}

.subtitle {
font-size: 14px;
color: #bbb;
margin-bottom: 15px;
}

a{
display:flex;
align-items:center;
justify-content:center;
gap: 10px;
margin:8px 0;
padding:12px;
background:linear-gradient(135deg, #008000, #003300);
color:#fff;
text-decoration:none;
border-radius:12px;
transition:.3s;
font-weight:bold;
width: 100%;
box-shadow: 0 4px 15px rgba(0, 255, 65, 0.3);
}

a:hover{
transform:translateY(-3px);
box-shadow:0 0 25px rgba(0, 255, 65, 0.7);
}

/* Sistema de Pesquisa de Música Integrado no Site */
.music-search-box {
width: 100%;
margin-top: 15px;
background: rgba(0, 40, 0, 0.8);
padding: 12px;
border-radius: 12px;
border: 1px solid rgba(0, 255, 65, 0.4);
display: flex;
flex-direction: column;
gap: 8px;
align-items: center;
box-shadow: inset 0 0 10px rgba(0, 255, 65, 0.2);
}

.music-search-box input {
width: 100%;
padding: 9px;
border-radius: 8px;
border: 1px solid rgba(0, 255, 65, 0.4);
background: rgba(0, 0, 0, 0.8);
color: #fff;
outline: none;
font-size: 12px;
}

.music-search-box input:focus {
border-color: #00ff41;
box-shadow: 0 0 10px rgba(0, 255, 65, 0.4);
}

.music-search-box button {
width: 100%;
padding: 9px;
border-radius: 8px;
border: none;
background: #00ff41;
color: #000;
font-weight: bold;
cursor: pointer;
transition: .3s;
font-size: 12px;
}

.music-search-box button:hover {
background: #00cc33;
box-shadow: 0 0 10px rgba(0, 255, 65, 0.6);
}

#player-container {
width: 100%;
height: 120px;
margin-top: 8px;
border-radius: 8px;
overflow: hidden;
background: #000;
border: 1px solid rgba(0, 255, 65, 0.3);
}

#player-container iframe {
width: 100%;
height: 100%;
border: none;
}

/* Painel da IA */
.ai-card {
background: rgba(0, 20, 0, 0.85);
padding: 25px;
border-radius: 20px;
box-shadow: 0 0 35px rgba(0, 255, 65, 0.4);
backdrop-filter: blur(10px);
width: 360px;
height: 440px;
border: 1px solid rgba(0, 255, 65, 0.3);
display: flex;
flex-direction: column;
justify-content: space-between;
}

.ai-header {
font-size: 18px;
color: #00ff41;
font-weight: bold;
text-align: center;
margin-bottom: 12px;
text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
}

.ai-messages {
flex: 1;
background: rgba(0, 0, 0, 0.6);
border-radius: 10px;
padding: 10px;
overflow-y: auto;
display: flex;
flex-direction: column;
gap: 10px;
border: 1px solid rgba(0, 255, 65, 0.2);
}

.msg {
padding: 8px 12px;
border-radius: 8px;
font-size: 13px;
max-width: 85%;
line-height: 1.4;
word-break: break-word;
}

.msg.ai {
background: rgba(0, 50, 0, 0.8);
color: #00ff41;
align-self: flex-start;
border: 1px solid rgba(0, 255, 65, 0.3);
}

.msg.user {
background: rgba(80, 0, 0, 0.8);
color: #ff4444;
align-self: flex-end;
border: 1px solid rgba(255, 0, 0, 0.3);
}

.ai-input-box {
display: flex;
gap: 8px;
margin-top: 12px;
}

.ai-input-box input {
flex: 1;
padding: 10px;
border-radius: 8px;
border: 1px solid rgba(0, 255, 65, 0.4);
background: rgba(0, 0, 0, 0.8);
color: #fff;
outline: none;
font-size: 13px;
}

.ai-input-box input:focus {
border-color: #00ff41;
box-shadow: 0 0 10px rgba(0, 255, 65, 0.4);
}

.ai-input-box button {
padding: 10px 15px;
border-radius: 8px;
border: none;
background: #00ff41;
color: #000;
font-weight: bold;
cursor: pointer;
transition: .3s;
}

.ai-input-box button:hover {
background: #00cc33;
box-shadow: 0 0 10px rgba(0, 255, 65, 0.6);
}

@media (max-width: 768px) {
.main-container {
    flex-direction: column;
    gap: 20px;
}
body {
    overflow: auto;
    height: auto;
    padding: 20px 0;
}
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="main-container">
    <div class="card">
        <h1>DIEL</h1>
        <p class="subtitle">Bem-vindo ao meu site</p>

        <a href="https://discord.gg/B2HMpM8mX" target="_blank">
        💬 Discord
        </a>

        <a href="https://www.instagram.com/_eitaakaah?igsh=MWtneXJlbzgzbmJk" target="_blank">
        📷 Instagram
        </a>

        <!-- Pesquisa e Player Integrado na Tela -->
        <div class="music-search-box">
            <input type="text" id="search-input" placeholder="Digite o nome de qualquer música..." onkeypress="handleSearchKey(event)">
            <button onclick="buscarMusica()">🔍 Tocar no Site</button>
            <div id="player-container">
                <!-- Inicia tocando a música Senta no Bugalu -->
                <iframe id="yt-frame" src="https://www.youtube.com/embed/2seO3j33LHA?autoplay=0" allow="autoplay"></iframe>
            </div>
        </div>
    </div>

    <div class="ai-card">
        <div class="ai-header">🤖 Assistente do Diel</div>
        <div class="ai-messages" id="chat-messages">
            <div class="msg ai">Olá, bem-vindo! Diel me programou, o que posso ajudar?</div>
        </div>
        <div class="ai-input-box">
            <input type="text" id="user-input" placeholder="Digite sua mensagem..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>
</div>

<script>
// Efeito Matrix Verde Fluido
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.onresize = resizeCanvas;

const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン';
const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
const alphabet = katakana + latin;

const fontSize = 16;
let columns = canvas.width / fontSize;
const rainDrops = [];
for (let x = 0; x < columns; x++) { rainDrops[x] = 1; }

function drawMatrix() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00FF41';
    ctx.font = fontSize + 'px monospace';

    for (let i = 0; i < rainDrops.length; i++) {
        const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
        ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

        if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            rainDrops[i] = 0;
        }
        rainDrops[i]++;
    }
}
setInterval(drawMatrix, 35);

// Sistema de Busca de Músicas Direto no Player do Site
function handleSearchKey(event) {
    if (event.key === 'Enter') {
        event.preventDefault();
        buscarMusica();
    }
}

async function buscarMusica() {
    const termo = document.getElementById('search-input').value.trim();
    if (!termo) {
        alert("Digite o nome de uma música!");
        return;
    }

    try {
        // Busca o vídeo correspondente de forma inteligente na web
        let res = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(termo)}&filter=videos`);
        let data = await res.json();
        
        if (data.items && data.items.length > 0) {
            let videoId = data.items[0].url.split('v=')[1];
            document.getElementById('yt-frame').src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
        } else {
            alert("Música não encontrada. Tente outro termo!");
        }
    } catch (e) {
        // Fallback direto seguro caso haja instabilidade na API pública
        let fallbackID = "2seO3j33LHA"; // Senta no Bugalu como padrão se falhar
        document.getElementById('yt-frame').src = `https://www.youtube.com/embed/${fallbackID}?autoplay=1`;
    }
}

// Sistema de IA Humano, Empático e Completo
function handleKeyPress(event) {
    if (event.key === 'Enter') { 
        event.preventDefault();
        sendMessage(); 
    }
}

function sendMessage() {
    const input = document.getElementById('user-input');
    const chat = document.getElementById('chat-messages');
    const text = input.value.trim();

    if (text === '') return;

    chat.innerHTML += `<div class="msg user">${escapeHtml(text)}</div>`;
    input.value = '';
    chat.scrollTop = chat.scrollHeight;

    const loadingId = 'loading-' + Date.now();
    chat.innerHTML += `<div class="msg ai" id="${loadingId}">Pensando...</div>`;
    chat.scrollTop = chat.scrollHeight;

    setTimeout(() => {
        let resposta = processarRespostaIA(text);
        document.getElementById(loadingId).innerText = resposta;
        chat.scrollTop = chat.scrollHeight;
    }, 500);
}

function processarRespostaIA(texto) {
    const t = texto.toLowerCase();
    const agora = new Date();

    if (t.includes('trai') || t.includes('traiu') || t.includes('chifre') || t.includes('termini') || t.includes('terminei') || t.includes('triste') || t.includes('chateado')) {
        return "Caramba, mano... sinto muito por isso. Passar por uma situação dessas mexe muito com a cabeça e dói demais. Tente respirar fundo e colocar sua cabeça no lugar agora. Você merece alguém que te valorize de verdade. Se quiser desabafar ou conversar sobre isso, tô aqui ouvindo!";
    }

    if (t.includes('conselho') || t.includes('o que você faria') || t.includes('problema') || t.includes('ajuda em')) {
        return "Olha, na vida a gente passa por vários baques, mas o segredo é não deixar que isso defina quem você é. Foque nos seus corres, nos seus projetos e em quem realmente tá com você nos momentos fáceis e difíceis. Quer conversar mais sobre o que tá pegando?";
    }

    if (t.includes('quanto é') || t.includes('mais') || t.includes('menos') || t.includes('vezes') || t.includes('dividido') || t.includes('+') || t.includes('-') || t.includes('*') || t.includes('/')) {
        try {
            let expr = t.replace('quanto é', '')
                        .replace('mais', '+')
                        .replace('menos', '-')
                        .replace('vezes', '*')
                        .replace('dividido por', '/')
                        .replace(/[^0-9+\-*/().]/g, '')
                        .trim();
            if (expr.length > 0) {
                let res = Function('"use strict";return (' + expr + ')')();
                if (res !== undefined && !isNaN(res)) {
                    return `O resultado da conta é: ${res} 🔢`;
                }
            }
        } catch(e) {}
    }

    if (t.includes('hora') || t.includes('horas') || t.includes('que horas são')) {
        const horaAtual = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        return `Agora são exatamente ${horaAtual} ⏰`;
    }

    if (t.includes('amanhã') || t.includes('que dia') || t.includes('data') || t.includes('hoje')) {
        const dias = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
        const diaHoje = dias[agora.getDay()];
        const amanha = new Date(agora);
        amanha.setDate(agora.getDate() + 1);
        const diaAmanha = dias[amanha.getDay()];
        const dataFormatada = agora.toLocaleDateString('pt-BR');
        
        if (t.includes('amanhã')) {
            return `Amanhã será ${diaAmanha}! 📅`;
        } else if (t.includes('data') || t.includes('dia de hoje')) {
            return `Hoje é ${diaHoje}, dia ${dataFormatada}! 🗓️`;
        } else {
            return `Hoje é ${diaHoje}! 🗓️`;
        }
    } 

    if (t.includes('piada') || t.includes('rir') || t.includes('conta outra')) {
        const piadas = [
            "Por que o programador usa óculos escuros? Porque ele não consegue lidar com C++! 👓😂",
            "O que o zero disse para o oito? — Belo cinto! 🤣",
            "Por que a galeria de arte foi presa? Porque ela era suspeita de armação! 🖼️😂",
            "Qual é o rei dos queijos? O Reiqueijo! 🧀👑"
        ];
        return piadas[Math.floor(Math.random() * piadas.length)];
    } 

    if (t.includes('olá') || t.includes('eae') || t.includes('salve') || t.includes('oi') || t.includes('tudo bem')) {
        return "Salve! Tudo tranquilo por aqui. E com você, como estão as coisas? Pode mandar a letra!";
    } 
    
    if (t.includes('diel') || t.includes('criador') || t.includes('quem é')) {
        return "O Diel é o criador genial deste site irado com tema Matrix e player de busca de músicas integrado!";
    } 
    
    if (t.includes('música') || t.includes('som') || t.includes('pesquisa')) {
        return "Basta digitar o nome de qualquer música na caixinha de pesquisa e clicar em 'Tocar no Site' para ela carregar direto na tela!";
    } 

    const conversasHumanas = [
        `Entendi o que você quis dizer sobre "${texto}". Na vida a gente aprende muito com essas situações. Me conta mais sobre isso, como você tá lidando com essa situação?`,
        `Pô, interessante isso que você falou sobre "${texto}". Qual é a sua visão sobre o assunto? Tô aqui para trocar ideia e te ouvir.`,
        `Com certeza! Sobre "${texto}", o importante é manter a mente firme. Quer que eu te dê um conselho ou prefere só trocar uma ideia livre?`
    ];

    return conversasHumanas[Math.floor(Math.random() * conversasHumanas.length)];
}

function escapeHtml(text) {
    return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
</script>

</body>
</html>
